<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEJM Révisions BTS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Lora:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FBF8F3;--cream2:#F5F0E8;--cream3:#EDE6D8;
  --sage:#7BA99A;--sage-l:#EAF3F0;--sage-m:#C2DDD7;
  --lav:#8B8FCC;--lav-l:#EEEEF8;--lav-m:#C8C9E8;
  --peach:#E8846A;--peach-l:#FDF0EC;
  --gold:#C9934A;--gold-l:#FDF3E4;
  --rose:#C97A8A;--rose-l:#FAEEF1;
  --ink:#2C2A26;--ink2:#4A4740;--ink3:#7A776E;--ink4:#A8A49C;
  --bd:#E4DDD0;--bd2:#D4CABC;--white:#FFFFFF;
}
body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);background:var(--cream);min-height:100vh}
.hdr{background:var(--white);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:34px;height:34px;background:var(--sage);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Lora',serif;font-size:13px;font-weight:600;color:#fff}
.logo-txt{font-family:'Lora',serif;font-size:17px;font-weight:600;color:var(--ink)}
.logo-sub{font-size:11px;color:var(--ink4);display:block;margin-top:-1px}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stat-chip{background:var(--cream);border:1px solid var(--bd);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--ink2)}
.save-ind{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sage);font-weight:500;background:var(--sage-l);border:1px solid var(--sage-m);border-radius:20px;padding:4px 10px}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--sage)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.saving{animation:pulse 1s infinite}
.xp-row{background:var(--white);border-bottom:1px solid var(--bd);padding:10px 24px;display:flex;align-items:center;gap:12px}
.lvl-badge{background:var(--lav);color:#fff;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;white-space:nowrap}
.xp-track{flex:1;height:7px;background:var(--cream2);border-radius:20px;overflow:hidden}
.xp-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--sage),var(--lav));transition:width .6s ease}
.xp-txt{font-size:11px;color:var(--ink4);white-space:nowrap}
.nav{background:var(--white);border-bottom:1px solid var(--bd);padding:0 24px;display:flex;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:12px 16px;font-size:13px;font-weight:500;color:var(--ink3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;font-family:inherit}
.nav-btn.active{color:var(--sage);border-bottom-color:var(--sage)}
.nav-btn:hover:not(.active){color:var(--ink)}
.content{padding:24px;max-width:720px;margin:0 auto}
.sec-lbl{font-size:11px;font-weight:600;color:var(--ink4);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--bd)}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:28px}
.ch-card{background:var(--white);border:1px solid var(--bd);border-radius:14px;padding:16px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.ch-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;background:var(--bar,var(--sage))}
.ch-card:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:0 4px 20px rgba(44,42,38,.09)}
.ch-num{font-size:10px;font-weight:600;color:var(--ink4);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.ch-title{font-size:13px;font-weight:600;color:var(--ink);line-height:1.4;margin-bottom:10px}
.ch-tag{display:inline-flex;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px}
.t-eco{background:var(--sage-l);color:var(--sage)}
.t-droit{background:var(--gold-l);color:var(--gold)}
.t-mgt{background:var(--rose-l);color:var(--rose)}
.t-num{background:var(--lav-l);color:var(--lav)}
.t-rh{background:var(--peach-l);color:var(--peach)}
.ch-prog{margin-top:10px;height:3px;background:var(--cream2);border-radius:4px;overflow:hidden}
.ch-prog-fill{height:100%;border-radius:4px;transition:width .3s}
.ch-done-badge{position:absolute;top:12px;right:12px;width:18px;height:18px;background:var(--sage);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,42,38,.4);backdrop-filter:blur(4px);z-index:100;overflow-y:auto;padding:20px}
.modal-overlay.open{display:block}
.modal-card{background:var(--white);border-radius:20px;max-width:600px;margin:0 auto;overflow:hidden;box-shadow:0 8px 40px rgba(44,42,38,.18)}
.modal-hdr{background:var(--cream);padding:16px 20px;display:flex;align-items:flex-start;gap:12px;border-bottom:1px solid var(--bd)}
.back-btn{background:var(--white);border:1px solid var(--bd);border-radius:10px;padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--ink2);transition:all .15s;white-space:nowrap}
.back-btn:hover{background:var(--cream2)}
.modal-title{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--ink);line-height:1.3}
.modal-tags{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap}
.modal-tag{background:var(--cream2);border-radius:6px;padding:2px 7px;font-size:11px;font-weight:500;color:var(--ink3)}
.modal-body{padding:22px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode-btn{background:var(--cream);border:1px solid var(--bd);border-radius:14px;padding:18px 16px;cursor:pointer;text-align:left;transition:all .18s;font-family:inherit;position:relative}
.mode-btn::after{content:'→';position:absolute;bottom:14px;right:14px;font-size:14px;color:var(--ink4);transition:all .2s}
.mode-btn:hover{border-color:var(--bd2);background:var(--white);transform:translateY(-1px);box-shadow:0 2px 12px rgba(44,42,38,.07)}
.mode-btn:hover::after{right:10px;color:var(--sage)}
.mode-ic{font-size:24px;margin-bottom:10px}
.mode-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px}
.mode-desc{font-size:11px;color:var(--ink3);line-height:1.4}
.kw-wrap{margin-top:12px;padding:12px 14px;background:var(--lav-l);border-radius:12px;border:1px solid var(--lav-m)}
.kw-lbl{font-size:10px;font-weight:600;color:var(--lav);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.kw-tag{display:inline-block;background:var(--white);border:1px solid var(--lav-m);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--lav);font-weight:500;margin:2px}
.fiche-block{background:var(--cream);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.fiche-block-title{font-size:11px;font-weight:600;color:var(--ink4);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.fiche-item{font-size:13px;color:var(--ink2);line-height:1.6;padding:7px 10px;background:var(--white);border-radius:8px;margin-bottom:6px;border:1px solid var(--bd)}
.fiche-item b{color:var(--sage);font-weight:600}
.fiche-formula{font-size:12px;color:var(--ink);background:var(--white);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;font-family:monospace;line-height:1.6}
.q-prog{display:flex;gap:4px;margin-bottom:16px}
.qdot{flex:1;height:4px;background:var(--cream2);border-radius:4px;transition:background .3s}
.qdot.done{background:var(--sage)}
.qdot.cur{background:var(--lav)}
.q-txt{font-size:15px;font-weight:600;color:var(--ink);line-height:1.5;margin-bottom:16px}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{background:var(--cream);border:1.5px solid var(--bd);border-radius:12px;padding:13px 16px;cursor:pointer;font-size:13px;color:var(--ink2);text-align:left;font-family:inherit;transition:all .15s;line-height:1.4;font-weight:500}
.quiz-opt:hover:not(:disabled){background:var(--white);border-color:var(--sage-m)}
.quiz-opt.correct{background:var(--sage-l);border-color:var(--sage);color:#3d7a6c}
.quiz-opt.wrong{background:var(--rose-l);border-color:var(--rose);color:#8a3a4a}
.quiz-fb{margin-top:12px;padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.5;display:none}
.quiz-fb.show{display:block}
.quiz-fb.ok{background:var(--sage-l);color:#3d7a6c;border:1px solid var(--sage-m)}
.quiz-fb.ko{background:var(--rose-l);color:#8a3a4a;border:1px solid #e8b4be}
.q-ctx{background:var(--lav-l);border-left:3px solid var(--lav);border-radius:0 10px 10px 0;padding:12px 14px;font-size:13px;color:var(--ink2);margin-bottom:12px;line-height:1.6}
.q-hint{background:var(--gold-l);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--gold);font-style:italic;margin-bottom:14px}
textarea{width:100%;min-height:120px;background:var(--cream);border:1.5px solid var(--bd);border-radius:12px;padding:13px 14px;font-size:13px;font-family:inherit;color:var(--ink);resize:vertical;outline:none;transition:border .15s;line-height:1.6}
textarea:focus{border-color:var(--lav);background:var(--white)}
.btn-main{background:var(--sage);color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;width:100%;margin-top:12px}
.btn-main:hover{background:#6a9889;transform:translateY(-1px)}
.btn-main:disabled{opacity:.5;cursor:default;transform:none}
.btn-lav{background:var(--lav);color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;width:100%;margin-top:12px}
.btn-lav:hover{background:#7a7ebc;transform:translateY(-1px)}
.btn-lav:disabled{opacity:.5;cursor:default;transform:none}
.btn-sec{background:var(--white);color:var(--ink2);border:1.5px solid var(--bd);border-radius:12px;padding:11px 18px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-sec:hover{border-color:var(--bd2);background:var(--cream)}
.ai-box{background:var(--cream);border:1.5px solid var(--bd);border-radius:14px;padding:16px;margin-top:14px;display:none}
.ai-box.show{display:block}
.ai-hdr{font-size:11px;font-weight:600;color:var(--lav);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ai-dot-anim{width:6px;height:6px;border-radius:50%;background:var(--lav);animation:pulse 1.2s infinite;display:inline-block}
.ai-text{font-size:13px;line-height:1.7;color:var(--ink2);white-space:pre-wrap}
.score-wrap{text-align:center;padding:20px 0}
.score-num{font-family:'Lora',serif;font-size:32px;font-weight:600;color:var(--ink)}
.score-pct{font-size:14px;color:var(--ink3);margin-top:4px}
.score-badge{display:inline-block;margin:12px 0;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600}
.s-a{background:var(--sage-l);color:#3d7a6c}
.s-b{background:var(--lav-l);color:#5a5ea0}
.s-c{background:var(--gold-l);color:#8a6020}
.s-d{background:var(--rose-l);color:#8a3a4a}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.met-card{background:var(--white);border:1px solid var(--bd);border-radius:14px;padding:16px;text-align:center}
.met-ic{font-size:28px;margin-bottom:3px}
.met-val{font-family:'Lora',serif;font-size:26px;font-weight:600;color:var(--ink)}
.met-lbl{font-size:11px;color:var(--ink4);font-weight:500;margin-top:2px}
.lvl-card{background:var(--lav-l);border:1px solid var(--lav-m);border-radius:14px;padding:16px;margin-bottom:24px}
.lvl-name{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--lav);margin-bottom:8px}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:10px 12px;background:var(--white);border:1px solid var(--bd);border-radius:10px;cursor:pointer;transition:all .15s}
.prog-row:hover{border-color:var(--bd2);box-shadow:0 2px 8px rgba(44,42,38,.06)}
.prog-row-title{flex:1;font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prog-bar-sm{flex:0 0 80px;height:5px;background:var(--cream2);border-radius:4px;overflow:hidden}
.prog-bar-sm-fill{height:100%;background:var(--sage);border-radius:4px}
.prog-pct{font-size:11px;color:var(--ink4);min-width:30px;text-align:right}
.save-banner{background:var(--sage-l);border:1px solid var(--sage-m);border-radius:12px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;font-size:13px;color:#3d7a6c;flex-wrap:wrap}
.reset-btn{background:var(--white);border:1px solid #e8b4be;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:500;color:var(--rose);cursor:pointer;font-family:inherit;margin-left:auto}
.reset-btn:hover{background:var(--rose-l)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--sage);color:#fff;border-radius:20px;padding:9px 18px;font-size:13px;font-weight:600;z-index:9999;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;box-shadow:0 4px 16px rgba(123,169,154,.4)}
.toast.show{transform:translateY(0);opacity:1}
.dots{display:flex;gap:5px;padding:12px 0}
.dots span{width:7px;height:7px;border-radius:50%;background:var(--lav);animation:bounce .9s infinite}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.nw{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
@media(max-width:600px){.hdr{padding:12px 16px}.content{padding:16px}.mode-grid{grid-template-columns:1fr}.ch-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="logo">
      <div class="logo-mark">C</div>
      <div><div class="logo-txt">CEJM</div><span class="logo-sub">Révisions BTS 1ère &amp; 2ème année</span></div>
    </div>
    <div class="hdr-right">
      <div class="save-ind"><div class="save-dot" id="save-dot"></div><span id="save-lbl">Chargement...</span></div>
      <div class="stat-chip">🔥 <span id="streak-v">0</span></div>
      <div class="stat-chip">⭐ <span id="xp-v">0</span> XP</div>
      <div class="stat-chip">✅ <span id="done-v">0</span></div>
    </div>
  </div>
  <div class="xp-row">
    <div class="lvl-badge" id="lvl-b">Niveau 1 · Novice</div>
    <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    <div class="xp-txt" id="xp-txt">0 / 200 XP</div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('chapitres',this)">📚 Chapitres</button>
    <button class="nav-btn" onclick="showTab('quiz',this)">🎯 Quiz rapide</button>
    <button class="nav-btn" onclick="showTab('situation',this)">💼 Mise en situation</button>
    <button class="nav-btn" onclick="showTab('progression',this)">📊 Progression</button>
  </div>
  <div class="content" id="main-content"></div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal-card">
    <div class="modal-hdr">
      <button class="back-btn" onclick="closeModal()">← Retour</button>
      <div style="flex:1;min-width:0">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-tags" id="modal-tags"></div>
      </div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SAVE_KEY="cejm-v3";
let S={xp:0,streak:0,done:0,lastDay:null,prog:{}};

function loadState(){
  try{const d=localStorage.getItem(SAVE_KEY);if(d)S={...S,...JSON.parse(d)};showSaveStatus('loaded');}catch(e){}
  updateHeader();
}
function saveState(){
  showSaveStatus('saving');
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));showSaveStatus('saved');}catch(e){showSaveStatus('error');}
}
let saveTO=null;
function scheduleSave(){clearTimeout(saveTO);saveTO=setTimeout(saveState,800);}
function showSaveStatus(s){
  const dot=document.getElementById('save-dot'),lbl=document.getElementById('save-lbl'),ind=document.querySelector('.save-ind');
  if(s==='saving'){dot.classList.add('saving');lbl.textContent='Sauvegarde...';ind.style.cssText='color:var(--gold);background:var(--gold-l);border-color:#EDD09A;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;border-radius:20px;padding:4px 10px';}
  else if(s==='saved'){dot.classList.remove('saving');lbl.textContent='Sauvegardé ✓';ind.style.cssText='color:var(--sage);background:var(--sage-l);border-color:var(--sage-m);display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;border-radius:20px;padding:4px 10px;border:1px solid';}
  else if(s==='loaded'){dot.classList.remove('saving');lbl.textContent='Progression chargée';ind.style.cssText='color:var(--lav);background:var(--lav-l);border-color:var(--lav-m);display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;border-radius:20px;padding:4px 10px;border:1px solid';setTimeout(()=>showSaveStatus('saved'),2000);}
}
async function resetProgress(){
  if(!confirm('Réinitialiser toute votre progression ?'))return;
  S={xp:0,streak:0,done:0,lastDay:null,prog:{}};
  localStorage.removeItem(SAVE_KEY);updateHeader();renderChaps();showToast('🔄 Progression réinitialisée');showSaveStatus('saved');
}
const levels=[{n:"Novice",max:200},{n:"Étudiant",max:500},{n:"Apprenti",max:1000},{n:"Confirmé",max:2000},{n:"Expert",max:4000},{n:"Champion CEJM",max:99999}];
function getLv(x){for(let i=0;i<levels.length;i++){if(x<levels[i].max)return{idx:i,...levels[i],prev:i>0?levels[i-1].max:0}}return{idx:levels.length-1,...levels[levels.length-1],prev:levels[levels.length-2].max}}
function updateHeader(){
  document.getElementById('xp-v').textContent=S.xp;
  document.getElementById('streak-v').textContent=S.streak;
  document.getElementById('done-v').textContent=S.done;
  const lv=getLv(S.xp);
  document.getElementById('lvl-b').textContent='Niv.'+(lv.idx+1)+' · '+lv.n;
  const pct=((S.xp-lv.prev)/(lv.max-lv.prev))*100;
  document.getElementById('xp-fill').style.width=Math.min(100,pct)+'%';
  document.getElementById('xp-txt').textContent=S.xp+' / '+lv.max+' XP';
}
function awardXP(n,label){
  S.xp+=n;S.done++;
  const today=new Date().toDateString();
  if(S.lastDay!==today){S.streak++;S.lastDay=today;}
  updateHeader();scheduleSave();showToast('+'+n+' XP · '+label);
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function closeModal(){document.getElementById('modal').classList.remove('open');}

async function callAI(systemPrompt,userContent){
  const r=await fetch('/api/gemini',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemPrompt,userContent})});
  if(!r.ok)throw new Error('Erreur serveur '+r.status);
  const d=await r.json();
  if(d.error)throw new Error(d.error);
  return d.text;
}

const chapters=[
  {id:1,num:"1",title:"Relations entre agents économiques",year:1,tag:"eco",tagLabel:"Économie",bar:"#7BA99A",keywords:["agent économique","entreprise","ménages","banques","administrations","flux réels","flux monétaires"],fiche:{def:["Un agent économique est une catégorie de personnes assurant une fonction économique principale.","Flux réels : échanges de biens, services et force de travail.","Flux monétaires : paiements, salaires, crédits, épargne, impôts."],agents:[["Entreprises","Vente de biens/services marchands à prix concurrentiel"],["Ménages","Consommation + offre de force de travail"],["Banques","Collecte épargne + accords de crédits (intermédiaire ABF/ACF)"],["Administrations","Production non marchande financée par l'impôt"]],formule:"Production → Revenus → Dépenses"}},

function doQuiz(id){
  const qs=quizBank[id];
  if(!qs||!qs.length){document.getElementById('modal-body').innerHTML=`<div style="padding:30px;text-align:center;color:var(--ink4)">Quiz en préparation.</div>`;return;}
  let cur=0,sc=0;
  function rQ(){
    const q=qs[cur];
    const dots=qs.map((_,i)=>`<div class="qdot${i<cur?' done':i===cur?' cur':''}"></div>`).join('');
    document.getElementById('modal-body').innerHTML=`
      <div class="q-prog">${dots}</div>
      <div class="q-txt">${q.q}</div>
      <div class="quiz-opts">${q.opts.map((o,i)=>`<button class="quiz-opt" onclick="pickOpt(${i})">${o}</button>`).join('')}</div>
      <div class="quiz-fb" id="qfb"></div>
      <div class="nw" id="qnxt" style="display:none"><button class="btn-main" onclick="nxtQ()" style="margin-top:0">${cur<qs.length-1?'Suivant →':'Résultats'}</button></div>
    `;
  }
  window.pickOpt=function(i){
    const q=qs[cur];
    document.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
    document.querySelectorAll('.quiz-opt')[i].classList.add(i===q.ans?'correct':'wrong');
    if(i!==q.ans)document.querySelectorAll('.quiz-opt')[q.ans].classList.add('correct');
    const fb=document.getElementById('qfb');
    fb.className='quiz-fb show '+(i===q.ans?'ok':'ko');
    fb.textContent=(i===q.ans?'✅ Correct ! ':'❌ Incorrect. ')+q.exp;
    if(i===q.ans)sc++;
    document.getElementById('qnxt').style.display='flex';
  };
  window.nxtQ=function(){
    cur++;
    if(cur<qs.length){rQ();return;}
    const pct=Math.round((sc/qs.length)*100),xp=sc*15;
    const cls=pct>=80?'s-a':pct>=60?'s-b':pct>=40?'s-c':'s-d';
    document.getElementById('modal-body').innerHTML=`
      <div class="score-wrap">
        <div style="font-size:48px;margin-bottom:10px">${pct>=80?'🏆':pct>=60?'😊':pct>=40?'🤔':'💪'}</div>
        <div class="score-num">${sc}/${qs.length}</div>
        <div class="score-pct">${pct}% de réussite</div>
        <div><span class="score-badge ${cls}">+${xp} XP</span></div>
        <div style="font-size:13px;color:var(--ink3);margin-bottom:20px">${pct>=80?'Excellent !':pct>=60?'Bien !':pct>=40?'Consultez la fiche.':'Recommencez après révision.'}</div>
      </div>
      <div class="nw">
        <button class="btn-sec" onclick="doQuiz(${id})">🔄 Recommencer</button>
        <button class="btn-main" onclick="openCh(${id})" style="margin-top:0">← Menu</button>
      </div>
    `;
    awardXP(xp,'Quiz complété');S.prog[id]=(S.prog[id]||0)+1;renderChaps();
  };
  rQ();
}

    <div class="sec-lbl">Ma progression</div>
    <div class="metrics-grid">
      <div class="met-card"><div class="met-ic">⭐</div><div class="met-val">${S.xp}</div><div class="met-lbl">XP Total</div></div>
      <div class="met-card"><div class="met-ic">📚</div><div class="met-val">${done}/${total}</div><div class="met-lbl">Débutés</div></div>
      <div class="met-card"><div class="met-ic">🏆</div><div class="met-val">${mastered}</div><div class="met-lbl">Maîtrisés</div></div>
      <div class="met-card"><div class="met-ic">🔥</div><div class="met-val">${S.streak}</div><div class="met-lbl">Jours de suite</div></div>
    </div>
    <div class="lvl-card">
      <div class="lvl-name">Niveau ${lv.idx+1} · ${lv.n}</div>
      <div class="xp-track" style="height:10px"><div class="xp-fill" style="width:${Math.min(100,((S.xp-lv.prev)/(lv.max-lv.prev))*100)}%"></div></div>
      <div style="font-size:12px;color:var(--lav);margin-top:6px">${S.xp} XP · encore ${Math.max(0,lv.max-S.xp)} XP pour le niveau suivant</div>
    </div>
    <div class="sec-lbl">Détail par chapitre</div>
    ${chapters.map(c=>{
      const p=S.prog[c.id]||0,pct=Math.min(100,Math.round((p/3)*100));
      return `<div class="prog-row" onclick="openCh(${c.id})">
        <div class="ch-tag t-${c.tag}" style="min-width:fit-content">${c.tagLabel}</div>
        <div class="prog-row-title">Ch.${c.num} – ${c.title}</div>
        <div class="prog-bar-sm"><div class="prog-bar-sm-fill" style="width:${pct}%"></div></div>
        <div class="prog-pct">${pct}%</div>
      </div>`;
    }).join('')}
  `;
}

loadState();
renderChaps();
</script>
</body>
</html>
